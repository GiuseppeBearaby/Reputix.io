<!DOCTYPE html>
<html>
<head>
<style>
  body { font-family: 'Inter', sans-serif; color: #0f172a; line-height: 1.6; margin: 0; padding: 0; }
  .container { max-width: 600px; margin: 0 auto; border: 1px solid #e2e8f0; border-radius: 16px; overflow: hidden; }
  .header { background-color: #10B981; color: white; padding: 32px; text-align: center; }
  .content { padding: 32px; }
  .stats-grid { display: table; width: 100%; border-collapse: separate; border-spacing: 10px; margin: 24px 0; }
  .stat-box { display: table-cell; background: #f8fafc; padding: 15px; border-radius: 12px; text-align: center; width: 33%; }
  .stat-val { display: block; font-size: 20px; font-weight: bold; color: #0f172a; }
  .stat-label { font-size: 10px; color: #64748b; text-transform: uppercase; font-weight: bold; }
  .button { display: inline-block; background-color: #007AFF; color: white; padding: 12px 24px; border-radius: 8px; text-decoration: none; font-weight: bold; }
  .footer { text-align: center; padding: 20px; color: #94a3b8; font-size: 12px; }
</style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1 style="margin:0">You earned a free month! 🎉</h1>
    </div>
    <div class="content">
      <p>Hi Tariq,</p>
      <p>Great news! One of the businesses you referred just subscribed to Reputix. As a thank you, we've credited <strong>1 free month</strong> to your Growth plan.</p>
      
      <div class="stats-grid">
        <div class="stat-box">
          <span class="stat-val">3</span>
          <span class="stat-label">Total Referrals</span>
        </div>
        <div class="stat-box">
          <span class="stat-val">2</span>
          <span class="stat-label">Converted</span>
        </div>
        <div class="stat-box">
          <span class="stat-val">2</span>
          <span class="stat-label">Months Earned</span>
        </div>
      </div>

      <div style="text-align: center; margin-top: 32px;">
        <a href="#" class="button">Refer Another Business</a>
      </div>
    </div>
    <div class="footer">
      Reputix AI · Made in Dubai 🇦🇪
    </div>
  </div>
</body>
</html>
